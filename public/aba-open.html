<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <script>
      ;(function () {
        var API_BASE = 'https://telegram-novel-app-production-7f1e.up.railway.app'
        var params = new URLSearchParams(location.search)
        var tranId = String(params.get('tran_id') || '').trim()
        var planId = String(params.get('plan_id') || '').trim()
        var handoff = String(params.get('handoff') || '').trim()
        var target = String(params.get('target') || '').trim()
        var back = String(params.get('back') || '').trim()
        var summonParam = String(params.get('summon') || '').trim()
        var cancelled = false
        var backTimer = 0
        var abaReportSent = false

        function reportAbaAppOpened() {
          if (abaReportSent || !tranId) return
          abaReportSent = true
          var payload = { tranId: tranId }
          if (handoff) payload.handoff = handoff
          fetch(API_BASE + '/api/vip-orders/aba-app-opened', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(payload),
          }).catch(function () {})
        }

        function isAndroid() {
          return /android/i.test(String(navigator.userAgent || ''))
        }

        function isIos() {
          return /iphone|ipad|ipod/i.test(String(navigator.userAgent || ''))
        }

        function extractEncodedQrcode(deeplink) {
          var raw = String(deeplink || '').trim()
          var match = raw.match(/[?&]qrcode=([^&#]+)/i)
          return match && match[1] ? String(match[1]) : ''
        }

        function buildQrPageUrl(failed) {
          var url =
            location.origin +
            '/vip/aba-khqr?tran_id=' +
            encodeURIComponent(tranId) +
            '&plan_id=' +
            encodeURIComponent(planId)
          if (handoff) url += '&handoff=' + encodeURIComponent(handoff)
          if (failed) url += '&aba_summon_failed=1'
          return url
        }

        function buildAndroidIntent(qrString, deeplink, fallbackBack) {
          var encoded = extractEncodedQrcode(deeplink)
          var back = String(fallbackBack || '').trim()
          if (encoded) {
            var intent =
              'intent://ababank.com?type=payway&qrcode=' +
              encoded +
              '#Intent;scheme=abamobilebank;'
            if (back) intent += 'S.browser_fallback_url=' + encodeURIComponent(back) + ';'
            intent += 'end;'
            return intent
          }
          var qr = String(qrString || '').trim()
          if (!qr) return ''
          var intent2 =
            'intent://ababank.com?type=payway&qrcode=' +
            encodeURIComponent(qr) +
            '#Intent;scheme=abamobilebank;'
          if (back) intent2 += 'S.browser_fallback_url=' + encodeURIComponent(back) + ';'
          intent2 += 'end;'
          return intent2
        }

        function buildSummonTarget(session, fallbackBack) {
          var qrString = String(session.qrString || '').trim()
          var deeplink = String(session.abapayDeeplink || '').trim()
          if (isAndroid()) return buildAndroidIntent(qrString, deeplink, fallbackBack)
          if (deeplink.toLowerCase().indexOf('abamobilebank://') === 0) return deeplink
          return ''
        }

        function cancelBack() {
          cancelled = true
          if (backTimer) window.clearTimeout(backTimer)
        }

        function goBack(failed) {
          if (cancelled) return
          var next = back
          if (!next && tranId && planId) next = buildQrPageUrl(failed !== false)
          if (!next) return
          try {
            location.replace(next)
          } catch (e) {
            location.href = next
          }
        }

        function scheduleBack(ms, failed) {
          if (cancelled) return
          if (backTimer) window.clearTimeout(backTimer)
          backTimer = window.setTimeout(function () {
            goBack(failed)
          }, ms)
        }

        function tryOpenTarget(summonTarget) {
          if (!summonTarget) return
          if (isIos()) {
            try {
              location.href = summonTarget
            } catch (e) {
              /* ignore */
            }
            return
          }
          try {
            var frame = document.createElement('iframe')
            frame.style.cssText = 'display:none;width:0;height:0;border:0'
            frame.src = summonTarget
            document.documentElement.appendChild(frame)
          } catch (e) {
            /* ignore */
          }
          window.setTimeout(function () {
            try {
              location.href = summonTarget
            } catch (e) {
              /* ignore */
            }
          }, 80)
        }

        function fallbackPrimaryMs() {
          return isIos() ? 1500 : 2800
        }

        function fallbackPageshowMs() {
          return isIos() ? 600 : 900
        }

        function fallbackFocusMs() {
          return isIos() ? 500 : 700
        }

        function attachFallbackTimers(failed) {
          scheduleBack(fallbackPrimaryMs(), failed)
          window.addEventListener('pageshow', function () {
            scheduleBack(fallbackPageshowMs(), failed)
          })
          window.addEventListener('focus', function () {
            scheduleBack(fallbackFocusMs(), failed)
          })
        }

        /** iOS: QR only when user returns to Safari without entering ABA (invalid URL OK / Open→Cancel). */
        function attachIosQrFallbackAfterSummon() {
          var qrDone = false
          var summonAt = Date.now()

          function tryShowQrIfStillOnBridge() {
            if (qrDone || cancelled) return
            if (document.visibilityState === 'hidden') {
              qrDone = true
              return
            }
            qrDone = true
            goBack(false)
          }

          function onSafariBounceBack() {
            if (Date.now() - summonAt < 320) return
            window.setTimeout(tryShowQrIfStillOnBridge, 60)
          }

          window.addEventListener('focus', onSafariBounceBack)
          window.addEventListener('pageshow', function (ev) {
            if (ev.persisted) return
            onSafariBounceBack()
          })
        }

        function iosOpenSummonNow(summonTarget) {
          if (!summonTarget || !isIos()) return
          try {
            location.replace(summonTarget)
          } catch (e) {
            try {
              location.href = summonTarget
            } catch (e2) {
              /* ignore */
            }
          }
        }

        document.addEventListener('visibilitychange', function () {
          if (document.visibilityState === 'hidden') {
            cancelBack()
            reportAbaAppOpened()
          }
        })
        window.addEventListener('pagehide', cancelBack)

        function startLegacyFlow() {
          if (target) tryOpenTarget(target)
          attachFallbackTimers(true)
        }

        function startHandoffFlow() {
          var qrBack = buildQrPageUrl(true)
          fetch(
            API_BASE +
              '/api/vip-orders/aba-khqr-handoff?tran_id=' +
              encodeURIComponent(tranId) +
              '&handoff=' +
              encodeURIComponent(handoff),
          )
            .then(function (res) {
              return res.json().catch(function () {
                return {}
              })
            })
            .then(function (data) {
              if (!data || !data.ok || !data.session) {
                goBack(true)
                return
              }
              var summonTarget = buildSummonTarget(data.session, qrBack)
              if (!summonTarget) {
                goBack(true)
                return
              }
              tryOpenTarget(summonTarget)
              attachFallbackTimers(true)
            })
            .catch(function () {
              goBack(true)
            })
        }

        // iOS: sync deeplink on first paint; QR only after invalid-address OK or Open→Cancel.
        // Installed + Open→Open: page hides → cancelBack → never show QR.
        if (summonParam && isIos() && tranId && handoff) {
          iosOpenSummonNow(summonParam)
          attachIosQrFallbackAfterSummon()
          return
        }

        if (tranId && handoff) {
          startHandoffFlow()
          return
        }

        startLegacyFlow()
      })()
    </script>
  </head>
  <body></body>
</html>
